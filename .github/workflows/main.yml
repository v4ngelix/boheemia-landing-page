name: Deploy to Website

on:
  push:
      branches:
        - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H boheemia.ee >> ~/.ssh/known_hosts
      - name: Deploy to server
        run: |
          ssh virt65914@boheemia.ee "\
          cd domeenid/www.boheemia.ee/ && \
          echo 'In directory:' && pwd && \
          rm -rf htdocs && \
          mkdir htdocs"
          rsync -az --exclude='.git' --exclude='.gitignore' ./ virt65914@boheemia.ee:domeenid/www.boheemia.ee/htdocs
