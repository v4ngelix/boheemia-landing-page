      padding: 0.1875rem;
      width: fit-content;
      font-family: monospace;
      font-size: 1rem;
      text-decoration: none;
      color: black;

      &:hover {
        color: black;
        font-weight: 800;
        cursor: pointer;
      }
    }

    p {
      margin: .75rem 0 .125rem 0;
    }

    @media (max-width: 480px) {
      body {
        flex-direction: column;
        gap: 4.5rem;
      }
